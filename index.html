<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiFans ยท Web็ซ?/title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #E8F0FE;
      color: #1A2332;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --primary: #4285F4;
      --primary-dark: #3367D6;
      --primary-light: #7BAAF7;
      --primary-bg: #E8F0FE;
      --primary-surface: #F5F8FF;
      --bg-main: #F0F6FF;
      --card-bg: #FFFFFF;
      --card-border: rgba(66, 133, 244, 0.10);
      --text-primary: #1A2332;
      --text-secondary: #5F6B7A;
      --text-muted: #8E98A3;
      --shadow-soft: rgba(66, 133, 244, 0.06);
      --glass-bg: rgba(255,255,255,0.88);
      --glass-border: rgba(66, 133, 244, 0.10);
      --badge-red: #FF3B30;
      --heart-red: #FF3040;
      --sidebar-width: 240px;
      --header-height: 64px;
    }

    .app-layout {
      display: flex;
      height: 100vh;
      max-width: 1440px;
      margin: 0 auto;
      background: var(--bg-main);
      box-shadow: 0 0 40px rgba(66, 133, 244, 0.06);
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--card-bg);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-logo {
      padding: 20px 24px;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4285F4, #7BAAF7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      border-bottom: 0.5px solid var(--glass-border);
    }

    .sidebar-logo span {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      display: block;
      margin-top: 2px;
    }

    .sidebar-nav { flex: 1; padding: 12px 0; }

    .nav-item-web {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.95rem;
      border-right: 3px solid transparent;
    }

    .nav-item-web:hover { background: var(--primary-bg); color: var(--primary-dark); }

    .nav-item-web.active {
      background: var(--primary-bg);
      color: var(--primary);
      font-weight: 700;
      border-right-color: var(--primary);
    }

    .nav-item-web i { width: 22px; font-size: 1.2rem; }

    .nav-item-web .nav-badge {
      margin-left: auto;
      background: var(--badge-red);
      color: white;
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 0.5px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-footer img {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary-light);
    }

    .sidebar-footer .info { flex: 1; }
    .sidebar-footer .name { font-weight: 700; font-size: 0.85rem; }
    .sidebar-footer .role { font-size: 0.65rem; color: var(--text-muted); }

    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .web-header {
      height: var(--header-height);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--glass-border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 20px;
      flex-shrink: 0;
    }

    .web-header .page-title-web {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .search-box-web {
      flex: 1;
      max-width: 420px;
      background: var(--primary-bg);
      border-radius: 30px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(66, 133, 244, 0.08);
    }

    .search-box-web i { color: var(--primary); font-size: 0.9rem; }

    .search-box-web input {
      border: none;
      background: transparent;
      outline: none;
      flex: 1;
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    .search-box-web input::placeholder { color: var(--text-muted); }

    .header-actions-web {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-left: auto;
    }

    .header-actions-web i {
      font-size: 1.3rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: 0.2s;
    }

    .header-actions-web i:hover { color: var(--primary); }

    .btn-vip-web {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    .btn-vip-web:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
    }

    .content-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    .content-wrapper::-webkit-scrollbar { width: 6px; }
    .content-wrapper::-webkit-scrollbar-track { background: transparent; }
    .content-wrapper::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 10px; }

    .web-page { display: none; }
    .web-page.active { display: block; }

    /* ===== ้็จ็ปไปถ ===== */
    .section-header-web {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 24px 0 16px;
    }

    .section-title-web {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .section-title-web i { color: var(--primary); margin-right: 8px; }

    .section-more-web {
      font-size: 0.8rem;
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
    }

    .tag-web {
      background: white;
      border: 1px solid var(--card-border);
      padding: 8px 22px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--primary-dark);
      cursor: pointer;
      box-shadow: 0 1px 4px var(--shadow-soft);
      transition: 0.2s;
      display: inline-block;
    }

    .tag-web:hover {
      background: var(--primary-bg);
      border-color: var(--primary-light);
    }

    .tag-web i { margin-right: 6px; color: var(--primary); }

    .algo-row-web {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 0 18px;
    }

    .algo-chip-web {
      background: white;
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 8px 18px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      box-shadow: 0 1px 4px var(--shadow-soft);
      transition: 0.2s;
    }

    .algo-chip-web:hover { background: var(--primary-bg); color: var(--primary); }
    .algo-chip-web i { margin-right: 6px; color: var(--primary); }

    .btn-follow-web {
      background: var(--primary);
      border: none;
      width: 100%;
      padding: 8px 0;
      border-radius: 40px;
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-follow-web.followed {
      background: var(--primary-bg);
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-follow-web:hover { opacity: 0.9; }

    .btn-sub-web {
      background: var(--primary);
      border: none;
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 0.75rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-sub-web.subscribed {
      background: var(--primary-bg);
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    /* ===== ้ฆ้กต ===== */
    .hero-section {
      background: linear-gradient(135deg, #4285F4, #7BAAF7);
      border-radius: 24px;
      padding: 32px 40px;
      color: white;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hero-text h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .hero-text p { opacity: 0.85; font-size: 0.95rem; }

    .hero-btn {
      background: white; color: var(--primary);
      padding: 10px 28px; border-radius: 50px;
      font-weight: 700; border: none; cursor: pointer;
      font-size: 0.9rem; transition: 0.2s;
    }

    .hero-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }

    .trend-row-web {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .creator-grid-web {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
      margin-bottom: 12px;
    }

    .creator-card-web {
      background: white;
      border-radius: 24px;
      padding: 20px;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 12px var(--shadow-soft);
      text-align: center;
      transition: 0.3s;
    }

    .creator-card-web:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(66, 133, 244, 0.12); }

    .creator-card-web img {
      width: 72px; height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary-light);
      margin-bottom: 12px;
    }

    .creator-card-web .name { font-weight: 700; font-size: 1rem; color: var(--text-primary); }
    .creator-card-web .tags { font-size: 0.7rem; color: var(--primary-light); margin: 6px 0; }
    .creator-card-web .fans { font-size: 0.75rem; color: var(--text-muted); }
    .creator-card-web .price { font-weight: 700; color: var(--primary); font-size: 0.85rem; margin: 10px 0; }

    .video-grid-web {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .video-card-web {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 12px var(--shadow-soft);
      transition: 0.3s;
      cursor: pointer;
    }

    .video-card-web:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(66, 133, 244, 0.10); }

    .video-card-web .cover {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: var(--primary-bg);
    }

    .video-card-web .info { padding: 16px; }

    .video-card-web .creator-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .video-card-web .creator-row img {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary-light);
    }

    .video-card-web .creator-row .details { flex: 1; }
    .video-card-web .creator-row .nick { font-weight: 700; color: var(--text-primary); font-size: 0.9rem; }
    .video-card-web .creator-row .vtag { font-size: 0.7rem; color: var(--primary-light); }

    .video-card-web .title {
      margin-top: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .video-card-web .stats {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .subscription-zone-web {
      background: linear-gradient(145deg, #F0F6FF, #E8F0FE);
      border-radius: 30px;
      padding: 24px;
      margin: 28px 0;
      border: 1px solid rgba(66, 133, 244, 0.12);
    }

    .zone-header-web {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .zone-header-web .title { font-weight: 800; color: var(--primary-dark); font-size: 1rem; }
    .zone-header-web .title i { color: var(--primary); margin-right: 8px; }
    .zone-header-web .badge {
      font-size: 0.7rem;
      background: rgba(66, 133, 244, 0.10);
      padding: 4px 16px;
      border-radius: 40px;
      color: var(--primary);
      font-weight: 600;
    }

    .premium-grid-web {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .preview-card-web {
      background: white;
      border-radius: 20px;
      padding: 14px;
      text-align: center;
      position: relative;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 6px var(--shadow-soft);
      cursor: pointer;
      transition: 0.3s;
    }

    .preview-card-web:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(66, 133, 244, 0.10); }

    .preview-card-web img {
      width: 100%;
      border-radius: 16px;
      aspect-ratio: 1;
      object-fit: cover;
      filter: blur(6px);
    }

    .preview-card-web .lock-badge {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
      padding: 6px 16px;
      border-radius: 60px;
      font-size: 0.7rem;
      color: var(--primary);
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .preview-card-web .price { margin-top: 10px; font-weight: bold; color: var(--primary); font-size: 0.8rem; }

    .path-steps-web {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
      background: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border: 1px solid var(--card-border);
    }

    .feed-grid-web {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .dynamic-card-web {
      background: white;
      border-radius: 24px;
      padding: 18px;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 8px var(--shadow-soft);
      transition: 0.3s;
    }

    .dynamic-card-web:hover { box-shadow: 0 6px 20px rgba(66, 133, 244, 0.08); }

    .dynamic-card-web .header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dynamic-card-web .header img {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary-light);
    }

    .dynamic-card-web .header .name { font-weight: 700; color: var(--text-primary); }
    .dynamic-card-web .header .time { font-size: 0.65rem; color: var(--text-muted); }
    .dynamic-card-web .text { margin: 12px 0; color: var(--text-secondary); line-height: 1.5; }
    .dynamic-card-web .media { border-radius: 20px; width: 100%; max-height: 240px; object-fit: cover; }

    .vote-box-web {
      background: var(--primary-bg);
      border-radius: 20px;
      padding: 14px;
      margin-top: 12px;
    }

    .vote-option-web {
      padding: 8px 12px;
      margin-bottom: 6px;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.2s;
    }

    .vote-option-web:hover { background: var(--primary); color: white; }

    /* ===== ๅ็ฐ้ก?===== */
    .discover-feed-web {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .discover-card-web {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 8px var(--shadow-soft);
      transition: 0.3s;
      cursor: pointer;
    }

    .discover-card-web:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(66, 133, 244, 0.10); }

    .discover-card-web img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
    }

    .discover-card-web .info { padding: 12px; }
    .discover-card-web .info .name { font-weight: 700; font-size: 0.9rem; }
    .discover-card-web .info .desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

    .category-row-web {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 16px 0;
    }

    .category-tag-web {
      background: white;
      border: 1px solid var(--card-border);
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      box-shadow: 0 1px 4px var(--shadow-soft);
      transition: 0.2s;
    }

    .category-tag-web:hover { background: var(--primary-bg); color: var(--primary); border-color: var(--primary-light); }
    .category-tag-web.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* ===== ๅไฝ่ไธป้ก?===== */
    .creator-page-web { display: none; }
    .creator-page-web.active { display: block; }

    .creator-cover-web {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 24px;
      margin-bottom: 20px;
    }

    .creator-header-info-web {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .creator-avatar-big-web {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--primary-light);
    }

    .creator-meta-web { flex: 1; }
    .creator-meta-web .name { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); }
    .creator-meta-web .bio { font-size: 0.9rem; color: var(--text-secondary); margin: 6px 0; }
    .creator-meta-web .stats-row { display: flex; gap: 24px; margin: 8px 0; }
    .creator-meta-web .stats-row .num { font-weight: 700; color: var(--text-primary); font-size: 1rem; }
    .creator-meta-web .stats-row .label { font-size: 0.7rem; color: var(--text-muted); }

    .subscribe-plan-card-web {
      background: white;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 8px var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      transition: 0.3s;
    }

    .subscribe-plan-card-web:hover { box-shadow: 0 6px 20px rgba(66, 133, 244, 0.08); }

    .subscribe-plan-card-web .plan-name { font-weight: 700; font-size: 1rem; }
    .subscribe-plan-card-web .plan-price { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
    .subscribe-plan-card-web .plan-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

    .btn-subscribe-plan-web {
      background: var(--primary);
      border: none;
      padding: 8px 24px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-subscribe-plan-web:hover { opacity: 0.9; transform: translateY(-1px); }

    .content-preview-grid-web {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .content-preview-card-web {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 8px var(--shadow-soft);
      transition: 0.3s;
      cursor: pointer;
    }

    .content-preview-card-web:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(66, 133, 244, 0.10); }

    .content-preview-card-web img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .content-preview-card-web .preview-info { padding: 12px; }
    .content-preview-card-web .preview-info .title { font-weight: 600; font-size: 0.85rem; }
    .content-preview-card-web .preview-info .lock-icon { color: var(--primary); font-size: 0.75rem; }

    .collection-card-web {
      background: white;
      border-radius: 20px;
      padding: 16px;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 8px var(--shadow-soft);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: 0.3s;
      cursor: pointer;
    }

    .collection-card-web:hover { box-shadow: 0 6px 20px rgba(66, 133, 244, 0.08); }

    .collection-card-web img {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      object-fit: cover;
    }

    .collection-card-web .info { flex: 1; }
    .collection-card-web .info .name { font-weight: 700; }
    .collection-card-web .info .desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    .back-btn-web {
      display: inline-flex;
      align-items: center;
      gap: 8px;
